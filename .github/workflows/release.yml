name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build archives
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          APP_NAME="aws-go-forward"
          DIST_DIR="dist"
          rm -rf "${DIST_DIR}"
          mkdir -p "${DIST_DIR}"

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
            "windows arm64"
            "freebsd amd64"
            "freebsd arm64"
          )

          for target in "${targets[@]}"; do
            set -- ${target}
            goos="$1"
            goarch="$2"

            ext=""
            archive_ext=".tar.gz"
            if [ "${goos}" = "windows" ]; then
              ext=".exe"
              archive_ext=".zip"
            fi

            base="${APP_NAME}-${VERSION}-${goos}-${goarch}"
            pkg_path="${DIST_DIR}/${base}${archive_ext}"
            stage_dir="${DIST_DIR}/${base}"
            bin_name="${APP_NAME}${ext}"
            bin_path="${stage_dir}/${bin_name}"

            echo "Building ${goos}/${goarch}..."
            mkdir -p "${stage_dir}"
            CGO_ENABLED=0 GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags="-s -w" -o "${bin_path}" .
            cp README.md "${stage_dir}/README.md"

            if [ "${archive_ext}" = ".zip" ]; then
              (
                cd "${DIST_DIR}"
                zip -r "${base}${archive_ext}" "${base}"
              )
            else
              tar -czf "${pkg_path}" -C "${DIST_DIR}" "${base}"
            fi

            rm -rf "${stage_dir}"
          done

          (
            cd "${DIST_DIR}"
            sha256sum *.tar.gz *.zip > checksums.txt
          )

      - name: Publish GitHub release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3
        with:
          body: |
            ## Download

            1. Open the **Assets** section below.
            2. Download the archive for your platform:
               - `aws-go-forward-<version>-<os>-<arch>.tar.gz` (Linux/macOS/FreeBSD)
               - `aws-go-forward-<version>-<os>-<arch>.zip` (Windows)
            3. Optionally verify checksums with `checksums.txt`.

            ## Install

            1. Extract the downloaded archive.
            2. Move the binary (`aws-go-forward` or `aws-go-forward.exe`) into a directory on your `PATH`.

            Example (Linux/macOS):
            ```bash
            tar -xzf aws-go-forward-<version>-linux-amd64.tar.gz
            sudo install -m 0755 aws-go-forward-<version>-linux-amd64/aws-go-forward /usr/local/bin/aws-go-forward
            aws-go-forward --help
            ```

            Each archive includes the repository `README.md` for full documentation.
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
